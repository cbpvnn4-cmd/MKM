services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: elevator_db
    restart: always
    environment:
      POSTGRES_DB: elevator_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: StrongP@ssw0rd!2025
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elevator_management"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - elevator_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elevator_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # DATABASE_URL: الأحرف الخاصة يجب ترميزها في URL
      # @ = %40, ! = %21
      - DATABASE_URL=postgresql://postgres:StrongP%40ssw0rd%212025@db:5432/elevator_management
      # SECRET_KEY نفسه المستخدم في .env
      - SECRET_KEY=635QF2g-yzLmgKflvYKalQydAkwM0p4NtY9FBb82dAE
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - DEBUG=True
      - ENVIRONMENT=development
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    networks:
      - elevator_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elevator_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - elevator_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: elevator_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    networks:
      - elevator_network

volumes:
  postgres_data:

networks:
  elevator_network:
    driver: bridge
