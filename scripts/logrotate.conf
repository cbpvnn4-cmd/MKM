# Log rotation configuration for Elevator Company Management System

/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 root root
    postrotate
        # Send signal to nginx to reopen log files
        /usr/bin/docker kill --signal=USR1 elevator_nginx_prod 2>/dev/null || true
    endscript
}

/logs/nginx/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 nginx nginx
    sharedscripts
    postrotate
        /usr/bin/docker kill --signal=USR1 elevator_nginx_prod 2>/dev/null || true
    endscript
}

/logs/backend/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 root root
}

/logs/backup/*.log {
    weekly
    missingok
    rotate 12
    compress
    delaycompress
    notifempty
    create 644 root root
}